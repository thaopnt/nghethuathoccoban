<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mini Quiz Kiến Trúc</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Be Vietnam Pro", sans-serif;
    background:#09032a;
    color:white;
    overflow:hidden;
}

.container{
    width:100vw;
    height:100vh;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* NAV */

.nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.nav button{
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    padding:10px 15px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
    font-weight:600;
    backdrop-filter: blur(12px);
}

.nav button:hover{
    background:rgba(255,255,255,0.16);
}

.nav button.active{
    background:white;
    color:#09032a;
}

/* LAYOUT */

.bento{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    min-height:0;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    overflow:hidden;
    backdrop-filter: blur(14px);
}

/* CONTENT */

.content{
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:2px;
    opacity:0.7;
    margin-bottom:14px;
}

.title{
    font-size:40px;
    line-height:1.05;
    font-weight:700;
    margin-bottom:18px;
}

.question{
    font-size:18px;
    margin-bottom:20px;
    opacity:0.92;
}

/* OPTIONS */

.options{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:18px;
}

.option{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:14px 18px;
    font-size:15px;
    transition:0.3s;
    cursor:pointer;
}

.option:hover{
    background:rgba(255,255,255,0.14);
    transform:translateX(4px);
}

.option.selected{
    background:white;
    color:#09032a;
    font-weight:700;
}

.option.correct{
    background:#39d98a;
    color:#052814;
    font-weight:700;
    border:none;
}

.option.wrong{
    background:#ff6b6b;
    color:#3a0000;
    font-weight:700;
    border:none;
}

/* BUTTONS */

.button-group{
    display:flex;
    gap:12px;
    margin-bottom:14px;
}

.action-btn{
    border:none;
    background:white;
    color:#09032a;
    padding:14px 18px;
    border-radius:16px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.action-btn:hover{
    transform:translateY(-2px);
}

/* FEEDBACK */

.feedback{
    display:none;
    margin-top:6px;
    padding:16px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
}

.feedback h3{
    font-size:17px;
    margin-bottom:8px;
}

.feedback p{
    font-size:12.5px;
    line-height:1.7;
    opacity:0.82;
    font-style:italic;
}

/* IMAGE */

.image-wrap{
    position:relative;
    width:100%;
    height:100%;
}

.image-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.42),
        rgba(0,0,0,0.08)
    );
}

/* RESPONSIVE */

@media(max-width:1100px){

    body{
        overflow:auto;
    }

    .container{
        height:auto;
    }

    .bento{
        grid-template-columns:1fr;
    }

    .title{
        font-size:32px;
    }

    .image-wrap{
        height:380px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- NAV -->

    <div class="nav" id="navButtons"></div>

    <!-- MAIN -->

    <div class="bento">

        <!-- LEFT -->

        <div class="card content">

            <div class="label">
                MINI QUIZ KIẾN TRÚC
            </div>

            <div class="title" id="title"></div>

            <div class="question">
                Công trình này thuộc thời kỳ nào?
            </div>

            <div class="options">

                <div class="option" onclick="selectOption(this,'Cổ đại')">
                    A. Cổ đại
                </div>

                <div class="option" onclick="selectOption(this,'Trung đại')">
                    B. Trung đại
                </div>

                <div class="option" onclick="selectOption(this,'Hiện đại')">
                    C. Hiện đại
                </div>

            </div>

            <div class="button-group">

                <button class="action-btn" onclick="checkAnswer()">
                    Kiểm tra
                </button>

                <button class="action-btn" onclick="nextQuestion()">
                    Tiếp theo
                </button>

            </div>

            <div class="feedback" id="feedbackBox">

                <h3 id="feedbackTitle"></h3>

                <p id="feedbackText"></p>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card image-wrap">

            <img id="projectImage">

            <div class="overlay"></div>

        </div>

    </div>

</div>

];

/* RANDOMIZE */

projects = projects.sort(() => Math.random() - 0.5);

let currentIndex = 0;

const state = projects.map(() => ({
    selected:null,
    checked:false
}));

function renderNav(){

    const nav =
    document.getElementById("navButtons");

    nav.innerHTML = "";

    projects.forEach((_,index)=>{

        nav.innerHTML += `
            <button
            class="${index===currentIndex ? 'active':''}"
            onclick="showProject(${index})">
            ${index+1}
            </button>
        `;
    });
}

function showProject(index){

    currentIndex = index;

    const project =
    projects[index];

    document.getElementById("title").innerText =
    project.title;

    document.getElementById("projectImage").src =
    project.image;

    resetVisual();

    const currentState =
    state[index];

    if(currentState.selected){

        document.querySelectorAll(".option")
        .forEach(option=>{

            if(option.innerText.includes(currentState.selected)){

                option.classList.add("selected");
            }
        });
    }

    if(currentState.checked){

        applyResultState();
    }

    renderNav();
}

function selectOption(element, answer){

    if(state[currentIndex].checked) return;

    document.querySelectorAll(".option")
    .forEach(option =>
        option.classList.remove("selected")
    );

    element.classList.add("selected");

    state[currentIndex].selected = answer;
}

function checkAnswer(){

    const currentState =
    state[currentIndex];

    if(!currentState.selected) return;

    currentState.checked = true;

    applyResultState();
}

function applyResultState(){

    const project =
    projects[currentIndex];

    const currentState =
    state[currentIndex];

    const correctAnswer =
    project.answer;

    document.querySelectorAll(".option")
    .forEach(option=>{

        option.classList.remove(
            "selected"
        );

        if(option.innerText.includes(correctAnswer)){

            option.classList.add("correct");
        }

        if(
            option.innerText.includes(currentState.selected)
            &&
            currentState.selected !== correctAnswer
        ){

            option.classList.add("wrong");
        }
    });

    const feedbackBox =
    document.getElementById("feedbackBox");

    const feedbackTitle =
    document.getElementById("feedbackTitle");

    const feedbackText =
    document.getElementById("feedbackText");

    feedbackBox.style.display = "block";

    if(currentState.selected === correctAnswer){

        feedbackTitle.innerText =
        "✔ Chính xác!";

    }else{

        feedbackTitle.innerText =
        "✘ Chưa đúng — Đáp án đúng là: "
        + correctAnswer;
    }

    feedbackText.innerText =
    project.feedback;
}

function nextQuestion(){

    if(currentIndex < projects.length - 1){

        showProject(currentIndex + 1);
    }
}

function resetVisual(){

    document.querySelectorAll(".option")
    .forEach(option=>{

        option.classList.remove(
            "selected",
            "correct",
            "wrong"
        );
    });

    document.getElementById("feedbackBox")
    .style.display = "none";
}

showProject(0);

</script>
